<!DOCTYPE html>
<html>
<head>
<title>BEAST GALAXY — 3D EARTH NETWORK MAP</title>
<style>
body {
    margin: 0; background: black; overflow: hidden;
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Earth
let texture = new THREE.TextureLoader().load("https://raw.githubusercontent.com/creativetimofficial/public-assets/master/earth.jpg");
let earthGeo = new THREE.SphereGeometry(3, 64, 64);
let earthMat = new THREE.MeshBasicMaterial({ map: texture });
let earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// Glow atmosphere
let glowGeo = new THREE.SphereGeometry(3.3, 64, 64);
let glowMat = new THREE.MeshBasicMaterial({
    color: 0x6f00ff,
    transparent: true,
    opacity: 0.35
});
let glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

// Camera position
camera.position.z = 6;

// Auto rotate
function animate() {
    requestAnimationFrame(animate);
    earth.rotation.y += 0.002;
    renderer.render(scene, camera);
}
animate();

// Live PC markers
function addNode(lat, lon, color=0x00ff00) {
    let phi = (90 - lat) * (Math.PI / 180);
    let theta = (lon + 180) * (Math.PI / 180);

    let x = 3 * Math.sin(phi) * Math.cos(theta);
    let y = 3 * Math.cos(phi);
    let z = 3 * Math.sin(phi) * Math.sin(theta);

    let markerGeo = new THREE.SphereGeometry(0.05, 16, 16);
    let markerMat = new THREE.MeshBasicMaterial({ color });
    let marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.set(x, y, z);
    scene.add(marker);
}
</script>

</body>
</html>
