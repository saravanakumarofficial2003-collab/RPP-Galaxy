<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BEAST GALAXY — CCTV LIVE MAP</title>

<style>
    body {
        margin: 0;
        background: #02030a;
        overflow-x: hidden;
        font-family: 'Segoe UI', sans-serif;
        color: #e2e2ff;
    }

    h1 {
        text-align: center;
        padding: 20px;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #8100ff, #4d2cff);
        -webkit-background-clip: text;
        color: transparent;
    }

    #cctv-grid {
        width: 90%;
        margin: auto;
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
    }

    .cam-card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 18px;
        transition: 0.2s;
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(12px);
        box-shadow: 0 0 20px rgba(100, 50, 255, 0.25);
    }

    .cam-card:hover {
        transform: scale(1.04);
        box-shadow: 0 0 28px rgba(150, 80, 255, 0.45);
    }

    .cam-title {
        font-size: 20px;
        margin-bottom: 6px;
        font-weight: 600;
    }

    .status {
        padding: 6px 10px;
        border-radius: 10px;
        font-weight: bold;
        display: inline-block;
        margin-bottom: 10px;
    }

    .online { background: rgba(0,255,140,0.18); color: #00ff9d; }
    .offline { background: rgba(255,0,70,0.18); color: #ff0060; }
    .weak { background: rgba(255,200,0,0.18); color: #ffd54d; }

    .info {
        font-size: 14px;
        padding-top: 4px;
        opacity: 0.86;
    }

    .health-bar {
        width: 100%;
        height: 10px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        margin-top: 10px;
    }

    .health-fill {
        height: 100%;
        border-radius: 10px;
        background: linear-gradient(90deg, #00ffaa, #00aaff);
        width: 50%;
    }
</style>
</head>

<body>

<h1>🎥 BEAST GALAXY — CCTV MONITORING MAP</h1>

<div id="cctv-grid"></div>

<script>
// =============================================================
// CONNECT TO BEAST GALAXY SERVER
// =============================================================
let ws = new WebSocket("ws://192.168.1.77:8081");

ws.onopen = () => console.log("🟣 CCTV Map Connected");
ws.onerror = err => console.log("WS Error:", err);
ws.onclose = () => console.log("CCTV WebSocket Closed");

// =============================================================
// LIVE CCTV STATUS UPDATE
// =============================================================
ws.onmessage = msg => {
    let data = JSON.parse(msg.data);

    if (!data.cctv) return; // Server must send "cctv" array

    let grid = document.getElementById("cctv-grid");
    grid.innerHTML = ""; // reset list

    data.cctv.forEach(cam => {
        let div = document.createElement("div");
        div.className = "cam-card";

        let statusClass =
            cam.Status === "ONLINE" ? "online" :
            cam.Status === "WEAK"   ? "weak" :
            "offline";

        let healthWidth = cam.SignalStrength ? cam.SignalStrength + "%" : "0%";

        div.innerHTML = `
            <div class="cam-title">${cam.Name}</div>
            <div class="status ${statusClass}">${cam.Status}</div>

            <div class="info">📡 Strength: ${cam.SignalStrength || 0}%</div>
            <div class="info">🎥 Stream: ${cam.Stream || "Unknown"}</div>
            <div class="info">📝 Recording: ${cam.Recording || "Unknown"}</div>
            <div class="info">🌐 IP: ${cam.IP || "N/A"}</div>
            <div class="info">📦 NVR: ${cam.NVR || "N/A"}</div>

            <div class="health-bar">
                <div class="health-fill" style="width:${healthWidth};"></div>
            </div>
        `;

        grid.appendChild(div);
    });

};
</script>
</body>
</html>
